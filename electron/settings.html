<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>DS Code 설정</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Pretendard", "Helvetica Neue", sans-serif;
      background: #f8fafc;
      color: #1e293b;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      width: 100%;
      max-width: 440px;
      background: white;
      border: 1px solid #e2e8f0;
      border-radius: 16px;
      padding: 32px;
      box-shadow: 0 4px 6px -1px rgba(0,0,0,0.04);
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 4px;
    }
    .brand-dot {
      width: 28px; height: 28px;
      background: linear-gradient(135deg, #1e293b, #334155);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      color: #f59e0b; font-weight: 700; font-size: 14px;
    }
    .brand-name {
      font-size: 13px;
      color: #64748b;
      letter-spacing: 0.02em;
    }
    h1 {
      font-size: 20px;
      font-weight: 600;
      margin: 12px 0 8px;
      letter-spacing: -0.01em;
    }
    .sub {
      font-size: 13px;
      color: #64748b;
      line-height: 1.6;
      margin: 0 0 24px;
    }
    label {
      display: block;
      font-size: 12px;
      color: #475569;
      margin-bottom: 6px;
      font-weight: 500;
    }
    input[type="text"] {
      width: 100%;
      padding: 11px 13px;
      border: 1px solid #cbd5e1;
      border-radius: 9px;
      font-size: 13px;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      outline: none;
      transition: border-color 0.15s;
    }
    input[type="text"]:focus {
      border-color: #1e293b;
    }
    .hint {
      margin-top: 8px;
      font-size: 11px;
      color: #94a3b8;
      line-height: 1.5;
    }
    .err {
      margin-top: 10px;
      font-size: 12px;
      color: #dc2626;
      min-height: 16px;
    }
    button {
      width: 100%;
      margin-top: 20px;
      background: #1e293b;
      color: white;
      border: none;
      padding: 12px 16px;
      border-radius: 9px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }
    button:hover:not(:disabled) { background: #0f172a; }
    button:disabled { opacity: 0.45; cursor: not-allowed; }
  </style>
</head>
<body>
  <div class="card">
    <div class="brand">
      <div class="brand-dot">D</div>
      <div class="brand-name">DS Code</div>
    </div>
    <h1>처음 시작합니다</h1>
    <p class="sub">선생님께서 발급해주신 <strong>API 토큰</strong>을 붙여넣으세요. 토큰은 이 컴퓨터의 보안 저장소(macOS Keychain)에만 암호화되어 저장됩니다.</p>

    <label for="token">API 토큰</label>
    <input id="token" type="text" placeholder="dsk_..." autofocus autocomplete="off" spellcheck="false" />
    <div class="hint">"dsk_" 로 시작하는 긴 문자열입니다.</div>
    <div id="err" class="err"></div>
    <button id="save" disabled>저장하고 시작</button>
  </div>

  <script>
    const input = document.getElementById('token');
    const btn = document.getElementById('save');
    const err = document.getElementById('err');

    function validate() {
      const v = input.value.trim();
      btn.disabled = !(v.startsWith('dsk_') && v.length > 16);
    }

    input.addEventListener('input', validate);
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !btn.disabled) btn.click();
    });

    btn.addEventListener('click', async () => {
      btn.disabled = true;
      err.textContent = '';
      try {
        await window.dscode.saveToken(input.value.trim());
        // main 측에서 이 창을 닫고 main 윈도우 띄움.
      } catch (e) {
        err.textContent = e.message || String(e);
        btn.disabled = false;
      }
    });

    validate();
  </script>
</body>
</html>
